<!-- index.html - Clean iPhone UI refactor -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Putting Scene - Brunch Search</title>
    <link rel="stylesheet" href="globals.css">
    <link rel="stylesheet" href="styleguide.css">
    <link rel="stylesheet" href="ce76db46459b3898.css">
    <link rel="stylesheet" href="style.css">
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css' rel='stylesheet' />
</head>

<body class="iphone-frame">
    <!-- iPhone frame container -->
    <div class="iphone-frame">

        <!-- Map background (static screenshot for now) -->
        <div class="map-container">
            <img class="image-background" src="img/image-background.png" alt="Map background">
            <img class="screen-shot" src="img/screen-shot-2025-12-31-at-12-36-00.png" alt="Map screenshot">

            <!-- Navigation dots -->
            <img class="vector" src="img/vector-26.svg" />
            <div class="ellipse"></div>
            <div class="div"></div>
        </div>

        <!-- Search bar -->
        <div class="search-background">
            <img class="img" src="img/vector-13.svg" />
            <div class="search-text">Search for brunches</div>
        </div>

        <!-- Category tabs -->
        <div class="tabs-container">
            <div class="restaurants-control">
                <div class="restaurants-button"></div>
                <div class="restaurants-text">Restaurants</div>
                <img class="vector-2" src="img/vector-4.svg" />
            </div>
            <div class="sports-control">
                <div class="div-2"></div>
                <div class="text-wrapper">Sports</div>
                <img class="vector-3" src="img/vector-11.svg" />
            </div>
            <div class="music-control">
                <div class="div-2"></div>
                <div class="text-wrapper">Music</div>
                <img class="vector-3" src="img/vector-3.svg" />
            </div>
            <div class="bars-control">
                <div class="bars-button"></div>
                <div class="bars-text">Bars</div>
                <img class="vector-4" src="img/vector-6.svg" />
            </div>
            <div class="more-control">
                <div class="more-button"></div>
                <div class="more-text">More...</div>
            </div>
        </div>

        <!-- Floating controls -->
        <div class="control-container">
            <div class="sort-filter-button">
                <div class="filter-button"></div>
                <div class="filter-text">Today</div>
                <img class="vector-5" src="img/vector-10.svg" />
            </div>
            <div class="sort-filter-control">
                <img class="vector-6" src="img/vector-14.svg" />
            </div>
        </div>

        <div class="vector-wrapper">
            <img class="vector-7" src="img/vector-9.svg" />
        </div>

        <div class="sort-filter-control-2">
            <div class="sort-filter-button-2"></div>
            <img class="vector-8" src="img/vector-8.svg" />
            <div class="sort-filter-text">Sort & Filter</div>
        </div>

        <!-- Exclude overlays (cleanup areas) -->
        <img class="exclude" src="img/exclude-2.svg" />
        <img class="exclude-2" src="img/exclude.svg" />
        <img class="exclude-3" src="img/exclude-4.svg" />
        <img class="exclude-4" src="img/exclude-3.svg" />

        <!-- Scrollable card rail -->
        <div class="card-rail">
            <div class="card" data-event="yoga-brunch">
                <div class="card-container-2">
                    <img class="screen-shot-2" src="img/screen-shot-2025-12-31-at-12-35-26-2.png" />
                    <div class="card-content">
                        <div class="date-text">Thursday, 10:00 AM</div>
                        <p class="event-title-text">New Year's Morning Yoga + Brunch</p>
                        <p class="location-text">The Studio by Copper + Cloves</p>
                        <div class="event-info-container">
                            <p class="duration-text">28 mins / 4.8 km</p>
                            <div class="directions-container">
                                <div class="directions-button">
                                    <div class="directions-text">Directions</div>
                                    <img class="vector-12" src="img/vector-20.svg" />
                                </div>
                                <div class="directions-button-2"></div>
                            </div>
                            <img class="vector-13" src="img/vector.svg" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" data-event="brunch-2">
                <div class="card-container-3">
                    <img class="union" src="img/union-3.svg" />
                    <img class="screen-shot-3" src="img/screen-shot-2025-12-31-at-12-35-26.png" />
                    <div class="card-content-2">
                        <div class="date-text">Thursday, 10:00 AM</div>
                        <p class="event-title-text">New Year's Morning Yoga + Brunch</p>
                        <p class="location-text">The Studio by Copper + Cloves</p>
                        <!-- Same content structure -->
                    </div>
                </div>
            </div>

            <div class="card" data-event="brunch-3">
                <div class="card-container-3">
                    <img class="union-2" src="img/union.svg" />
                    <img class="screen-shot-4" src="img/image.png" />
                    <div class="card-content-2">
                        <!-- Same structure -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom navigation -->
        <div class="bottom-bar-container"></div>
        <div class="control-container-2">
            <img class="vector-9" src="img/vector-2.svg" />
            <img class="vector-10" src="img/vector-19.svg" />
            <img class="vector-11" src="img/vector-17.svg" />
        </div>

        <!-- Additional vectors -->
        <img class="vector-16" src="img/vector-5.svg" />
        <img class="vector-17" src="img/vector-12.svg" />
        <img class="vector-18" src="img/vector-18.svg" />
        <img class="vector-19" src="img/image.svg" />
    </div>

    <!-- Mapbox map (inactive for now) -->
    <div id="map" class="map-hidden"></div>

    <script src="app.js"></script>
</body>

</html>
